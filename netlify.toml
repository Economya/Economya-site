# Redirections pour éliminer les doublons d'URL (www)
# qui empêchent Google d'indexer correctement le site.
# Chaque page ne doit exister qu'à UNE seule adresse.
#
# La redirection .html -> sans extension est gérée séparément dans le
# fichier `_redirects` (généré par generate_redirects.py), car Netlify
# n'autorise pas les jokers "*" au milieu d'un chemin comme "/*.html".

# www.economya.fr → economya.fr (redirection permanente 301)
[[redirects]]
  from = "https://www.economya.fr/*"
  to = "https://economya.fr/:splat"
  status = 301
  force = true

[build]
  publish = "."
