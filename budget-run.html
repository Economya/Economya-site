<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Budget Run — Economya.fr</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#0A0E1A;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;}
body{display:flex;align-items:center;justify-content:center;}
.wrap{position:relative;width:100%;max-width:480px;height:100vh;}
canvas{display:block;width:100%;height:100%;}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background:rgba(10,14,26,.94);backdrop-filter:blur(8px);}
.overlay.hidden{display:none;}
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,213,79,.12);border:1px solid rgba(255,213,79,.25);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:700;color:#FFD54F;letter-spacing:.06em;margin-bottom:16px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:900;letter-spacing:-.03em;color:#F5F5F7;margin-bottom:8px;}
h1 span{color:#FFD54F;}
.sub{font-size:14px;color:rgba(255,255,255,.5);line-height:1.55;margin-bottom:28px;max-width:280px;}
.score-big{font-family:'Space Grotesk',sans-serif;font-size:64px;font-weight:900;color:#FFD54F;line-height:1;margin-bottom:4px;}
.score-lbl{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:6px;}
.best-lbl{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:28px;}
.best-lbl b{color:#F5F5F7;}
.btn{background:#FFD54F;color:#1A0A00;border:none;border-radius:16px;padding:17px 40px;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;cursor:pointer;width:100%;max-width:280px;margin-bottom:10px;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-ghost{background:transparent;border:1.5px solid rgba(255,255,255,.15);color:#F5F5F7;border-radius:14px;padding:13px 30px;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:280px;}
.brand{margin-top:18px;font-size:12px;color:rgba(255,255,255,.3);}
.brand a{color:#FFD54F;text-decoration:none;}

/* Bouton saut mobile */
.jump-btn{position:absolute;bottom:20px;right:20px;width:72px;height:72px;border-radius:50%;background:rgba(255,213,79,.2);border:2px solid rgba(255,213,79,.4);display:flex;align-items:center;justify-content:center;font-size:28px;z-index:6;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.jump-btn:active{background:rgba(255,213,79,.4);}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <canvas id="c"></canvas>

  <div class="jump-btn" id="jumpBtn" style="display:none">🦘</div>

  <!-- INTRO -->
  <div class="overlay" id="ovIntro">
    <div class="tag">🎮 Economya.fr · Style Nintendo</div>
    <h1>Budget<br><span>Run</span></h1>
    <p class="sub">Courez, sautez, collectez les pièces d'épargne ! Esquivez les dettes et les dépenses inutiles. Jusqu'où irez-vous ?</p>
    <button class="btn" onclick="startGame()">▶ Démarrer</button>
    <div class="brand">Un jeu <a href="https://economya.fr" target="_blank">Economya.fr</a></div>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="ovOver">
    <div class="tag">💸 Game Over</div>
    <div class="score-big" id="ovScore">0</div>
    <div class="score-lbl">pièces collectées</div>
    <div class="best-lbl">Record : <b id="ovBest">0</b> pièces</div>
    <button class="btn" onclick="startGame()">🔄 Rejouer</button>
    <button class="btn-ghost" onclick="shareScore()">📤 Partager</button>
    <div class="brand">Un jeu <a href="https://economya.fr" target="_blank">Economya.fr</a></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');

let W, H, DPR;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Constantes ──────────────────────────────────────────
const GROUND_H = 80;
const GRAVITY = 0.6;
const JUMP_FORCE = -14;
const INITIAL_SPEED = 5;
const PLAYER_W = 32, PLAYER_H = 40;

let score, best, running, raf, speed, distance;
let player, coins, obstacles, particles, clouds;
let keys = {};
let jumping = false;

try { best = parseInt(localStorage.getItem('budgetRunBest') || '0'); } catch(e) { best = 0; }

// ── Contrôles ────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if(e.key === 'ArrowUp' || e.key === ' ' || e.key === 'ArrowRight') jump();
  keys[e.key] = true;
});
window.addEventListener('keyup', e => keys[e.key] = false);

const jumpBtn = document.getElementById('jumpBtn');
jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});
jumpBtn.addEventListener('mousedown', jump);

// Tap sur canvas aussi
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});
canvas.addEventListener('mousedown', jump);

function jump() {
  if(!running) return;
  if(player.onGround || player.jumpsLeft > 0) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumpsLeft--;
    player.jumpAnim = 1;
    // Particules saut
    for(let i=0;i<5;i++) {
      particles.push({x:player.x+PLAYER_W/2,y:H-GROUND_H,vx:(Math.random()-.5)*3,vy:-(Math.random()*2+1),life:1,color:'#FFD54F',r:3});
    }
  }
}

// ── Start ─────────────────────────────────────────────────
function startGame() {
  document.getElementById('ovIntro').classList.add('hidden');
  document.getElementById('ovOver').classList.add('hidden');
  document.getElementById('jumpBtn').style.display = 'flex';

  score = 0;
  distance = 0;
  speed = INITIAL_SPEED;
  running = true;

  player = {
    x: W * 0.15,
    y: H - GROUND_H - PLAYER_H,
    vy: 0,
    onGround: true,
    jumpsLeft: 1,
    jumpAnim: 0,
    runFrame: 0,
    dead: false,
  };

  coins = [];
  obstacles = [];
  particles = [];
  clouds = [
    {x:W*0.2, y:H*0.15, w:80, speed:0.3},
    {x:W*0.6, y:H*0.25, w:60, speed:0.2},
    {x:W*0.85, y:H*0.1, w:100, speed:0.4},
  ];

  // Spawn initial
  spawnCoins();

  cancelAnimationFrame(raf);
  lastTime = 0;
  raf = requestAnimationFrame(loop);
}

// ── Spawn ─────────────────────────────────────────────────
const COIN_TYPES = [
  {emoji:'🪙',val:1,color:'#FFD54F',r:12},
  {emoji:'💰',val:5,color:'#30D158',r:15},
  {emoji:'📈',val:10,color:'#0A84FF',r:14},
  {emoji:'💎',val:25,color:'#BF5AF2',r:16},
];

const OBS_TYPES = [
  {emoji:'💳',label:'Crédit',color:'#FF453A',w:28,h:32,type:'low'},
  {emoji:'🧾',label:'Facture',color:'#FF6EB4',w:24,h:40,type:'low'},
  {emoji:'💸',label:'Dépense',color:'#FF453A',w:30,h:28,type:'low'},
  {emoji:'⬆️',label:'Impôt',color:'#FF9F0A',w:32,h:48,type:'low'},
];

let spawnTimer = 0;
let coinTimer = 0;

function spawnCoins() {
  const groundY = H - GROUND_H;
  // Ligne de pièces flottantes
  const startX = W + 50;
  const count = 3 + Math.floor(Math.random() * 4);
  const type = COIN_TYPES[Math.floor(Math.random() * COIN_TYPES.length)];
  const pattern = Math.random();

  for(let i = 0; i < count; i++) {
    let cy;
    if(pattern < 0.5) {
      // Ligne horizontale
      cy = groundY - PLAYER_H - 20 - Math.random() * 80;
    } else {
      // Arc
      cy = groundY - PLAYER_H - 20 - Math.sin(i / count * Math.PI) * 100;
    }
    coins.push({
      x: startX + i * 45,
      y: cy,
      type,
      collected: false,
      bobOffset: Math.random() * Math.PI * 2,
      scale: 1,
    });
  }
}

function spawnObstacle() {
  const obs = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
  obstacles.push({
    x: W + 50,
    y: H - GROUND_H - obs.h,
    w: obs.w, h: obs.h,
    emoji: obs.emoji,
    color: obs.color,
    type: obs,
    hit: false,
  });
}

// ── Boucle ────────────────────────────────────────────────
let lastTime = 0;
function loop(now) {
  if(!running) return;
  const dt = Math.min((now - lastTime) / 16, 3);
  lastTime = now;

  update(dt);
  draw(now);
  raf = requestAnimationFrame(loop);
}

function update(dt) {
  distance += speed * dt;
  speed = INITIAL_SPEED + distance * 0.002; // accélération progressive

  // Joueur
  player.vy += GRAVITY * dt;
  player.y += player.vy * dt;
  const groundY = H - GROUND_H - PLAYER_H;
  if(player.y >= groundY) {
    player.y = groundY;
    player.vy = 0;
    player.onGround = true;
    player.jumpsLeft = 1;
  }

  // Animation course
  if(player.onGround) {
    player.runFrame += 0.2 * dt;
  }
  if(player.jumpAnim > 0) player.jumpAnim -= 0.05 * dt;

  // Spawn timer
  spawnTimer -= dt;
  coinTimer -= dt;
  if(spawnTimer <= 0) {
    spawnObstacle();
    spawnTimer = 50 + Math.random() * 80 - speed * 3;
    spawnTimer = Math.max(25, spawnTimer);
  }
  if(coinTimer <= 0) {
    spawnCoins();
    coinTimer = 60 + Math.random() * 40;
  }

  // Nuages
  clouds.forEach(c => {
    c.x -= c.speed * dt;
    if(c.x + c.w < 0) c.x = W + 50;
  });

  // Pièces
  const now2 = performance.now();
  coins.forEach(c => {
    c.x -= speed * dt;
    c.scale = 1 + Math.sin(now2 * 0.003 + c.bobOffset) * 0.1;
    if(!c.collected) {
      const dist = Math.hypot(player.x + PLAYER_W/2 - c.x, player.y + PLAYER_H/2 - c.y);
      if(dist < c.type.r + 16) {
        c.collected = true;
        score += c.type.val;
        // Particules
        for(let i=0;i<6;i++) {
          const ang = (i/6)*Math.PI*2;
          particles.push({x:c.x,y:c.y,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3-1,life:1,color:c.type.color,r:4,text:'+'+ c.type.val});
        }
        if(score > best) {
          best = score;
          try { localStorage.setItem('budgetRunBest', String(best)); } catch(e) {}
        }
      }
    }
  });
  coins = coins.filter(c => c.x > -50 && !c.collected);

  // Obstacles
  for(const o of obstacles) {
    o.x -= speed * dt;
    if(!o.hit && !player.onGround === false) {
      // Collision AABB
      if(
        player.x + 4 < o.x + o.w &&
        player.x + PLAYER_W - 4 > o.x &&
        player.y + 4 < o.y + o.h &&
        player.y + PLAYER_H > o.y + 4
      ) {
        gameOver();
        return;
      }
    }
  }
  obstacles = obstacles.filter(o => o.x > -80);

  // Particules
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.1 * dt;
    p.life -= 0.03 * dt;
  });
  particles = particles.filter(p => p.life > 0);
}

function draw(now) {
  // Ciel
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#060A14');
  skyGrad.addColorStop(0.7, '#0F1628');
  skyGrad.addColorStop(1, '#162035');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Nuages
  clouds.forEach(c => {
    ctx.fillStyle = 'rgba(255,255,255,.05)';
    ctx.beginPath();
    ctx.ellipse(c.x + c.w/2, c.y, c.w/2, 18, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.3, c.y + 5, c.w*0.3, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w*0.7, c.y + 5, c.w*0.25, 10, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Sol
  const groundY = H - GROUND_H;
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
  groundGrad.addColorStop(0, '#1E2E45');
  groundGrad.addColorStop(0.3, '#0F1628');
  groundGrad.addColorStop(1, '#060A14');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, W, GROUND_H);

  // Ligne de sol
  ctx.strokeStyle = '#FFD54F';
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 10]);
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Grille sol défilante
  ctx.strokeStyle = 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  const gridOffset = (distance * speed * 0.5) % 60;
  for(let x = -gridOffset; x < W; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, groundY);
    ctx.lineTo(x, H);
    ctx.stroke();
  }

  // Distance compteur
  ctx.font = 'bold 13px Space Grotesk, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.textAlign = 'left';
  ctx.fillText('📏 ' + Math.floor(distance) + 'm', 16, 30);

  // Score
  ctx.font = 'bold 20px Space Grotesk, sans-serif';
  ctx.fillStyle = '#FFD54F';
  ctx.textAlign = 'center';
  ctx.fillText('🪙 ' + score, W/2, 30);

  // Best
  ctx.font = 'bold 12px Space Grotesk, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.textAlign = 'right';
  ctx.fillText('Record: ' + best, W - 16, 30);

  // Obstacles
  obstacles.forEach(o => {
    ctx.save();
    // Ombre
    ctx.fillStyle = 'rgba(255,69,58,.2)';
    ctx.beginPath();
    ctx.ellipse(o.x + o.w/2, H - GROUND_H + 5, o.w/2, 6, 0, 0, Math.PI*2);
    ctx.fill();
    // Emoji
    ctx.font = o.h + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(o.emoji, o.x + o.w/2, o.y + o.h/2);
    // Label
    ctx.font = 'bold 9px Inter, sans-serif';
    ctx.fillStyle = o.color;
    ctx.fillText(o.type.label, o.x + o.w/2, o.y - 8);
    ctx.restore();
  });

  // Pièces
  coins.forEach(c => {
    if(c.collected) return;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.scale, c.scale);
    // Halo
    ctx.shadowColor = c.type.color;
    ctx.shadowBlur = 12;
    ctx.font = (c.type.r * 2) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.type.emoji, 0, 0);
    ctx.restore();
  });

  // Particules
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    if(p.text) {
      ctx.font = 'bold 11px Space Grotesk, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y - 12);
    }
    ctx.restore();
  });

  // Joueur
  drawPlayer();
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const bob = player.onGround ? Math.sin(player.runFrame) * 3 : 0;
  const squish = player.jumpAnim > 0 ? 1 - player.jumpAnim * 0.2 : 1;

  ctx.save();
  ctx.translate(px + PLAYER_W/2, py + PLAYER_H/2 + bob);
  ctx.scale(squish > 0.8 ? 1/squish : 1, squish);

  // Cape / corps
  const bodyColor = '#FFD54F';
  ctx.fillStyle = bodyColor;
  ctx.shadowColor = '#FFD54F';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(-PLAYER_W/2, -PLAYER_H/2, PLAYER_W, PLAYER_H, 8);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Visage
  ctx.fillStyle = '#FFF5E0';
  ctx.beginPath();
  ctx.ellipse(0, -PLAYER_H/2 + 14, 10, 11, 0, 0, Math.PI*2);
  ctx.fill();

  // Yeux
  ctx.fillStyle = '#1A0A00';
  ctx.beginPath(); ctx.ellipse(-3.5, -PLAYER_H/2 + 11, 2, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3.5, -PLAYER_H/2 + 11, 2, 2.5, 0, 0, Math.PI*2); ctx.fill();

  // Sourire
  ctx.strokeStyle = '#1A0A00';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, -PLAYER_H/2 + 16, 4, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // € sur le corps
  ctx.fillStyle = '#1A0A00';
  ctx.font = 'bold 16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('€', 0, PLAYER_H/2 - 14);

  // Jambes animées
  const legAnim = player.onGround ? Math.sin(player.runFrame * 2) * 8 : 0;
  ctx.fillStyle = '#FF9F0A';
  ctx.fillRect(-8, PLAYER_H/2 - 6, 7, 10 + legAnim);
  ctx.fillRect(2, PLAYER_H/2 - 6, 7, 10 - legAnim);

  ctx.restore();
}

// ── Game over ─────────────────────────────────────────────
function gameOver() {
  running = false;
  cancelAnimationFrame(raf);
  document.getElementById('jumpBtn').style.display = 'none';
  document.getElementById('ovScore').textContent = score;
  document.getElementById('ovBest').textContent = best;
  document.getElementById('ovOver').classList.remove('hidden');
}

function shareScore() {
  const t = `J'ai collecté ${score} pièces d'épargne sur Budget Run (Economya.fr) 🪙 À toi de battre mon record !`;
  if(navigator.share) navigator.share({title:'Budget Run', text:t, url:'https://economya.fr'}).catch(()=>{});
  else navigator.clipboard.writeText(t + ' https://economya.fr').then(() => alert('Copié !'));
}
</script>
</body>
</html>
